<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi novia...</title>
    <style>
        /* --- ESTILOS GENERALES --- */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        .contenedor {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            z-index: 10;
        }

        /* --- BOTONES COMUNES --- */
        .btn-accion {
            background-color: #FF0000;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.3s, box-shadow 0.3s;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
            margin-top: 20px;
        }

        .btn-accion:hover {
            background-color: #cc0000;
        }

        .btn-accion:active {
            transform: scale(0.95);
        }

        /* Botón gigante para el preview */
        .btn-gigante {
            padding: 20px 50px;
            font-size: 28px;
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.5);
            animation: latir 2s infinite; /* Le da un efecto de que "pide" ser clickeado */
        }

        /* --- FASES (Ocultas por defecto) --- */
        #fase-trampa, #fase-video, #fase-troll, #fase-preview-mensaje, #fase-preview-video {
            display: none;
            animation: aparecer 0.8s ease-in-out forwards;
        }

        /* --- FASE 2: CONTRASEÑA --- */
        .mensaje-trampa {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .pin-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .pin-box {
            width: 50px;
            height: 65px;
            font-size: 32px;
            text-align: center;
            background-color: transparent;
            color: white;
            border: 2px solid #555;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .pin-box:focus {
            border-color: #FF0000;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        .mensaje-error {
            color: #ff4444;
            font-size: 16px;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* --- REPRODUCTOR DE VIDEO --- */
        .reproductor {
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.2);
            outline: none;
            background-color: #111; /* Fondo oscuro por si el video tarda en cargar */
        }

        /* --- STICKER Y TROLL --- */
        .sticker-bebe {
            position: absolute;
            bottom: 30px; 
            left: 30px;
            width: 180px;
            max-width: 30vw;
            height: auto;
            border: 5px solid #ffffff;
            border-radius: 10px;
            transform: rotate(-8deg);
            box-shadow: 5px 5px 15px rgba(255, 255, 255, 0.15);
            opacity: 0.8;
            z-index: 1;
            pointer-events: none;
        }

        .imagen-troll {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
            animation: zoomTroll 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- ANIMACIONES --- */
        @keyframes aparecer {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes zoomTroll {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes latir {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .vibrar {
            animation: shake 0.4s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <img src="bebe.jpeg" alt="Ella de bebe" class="sticker-bebe">

    <div class="contenedor">
        
        <div id="fase-boton">
            <button class="btn-accion" id="btn-youtube">Ver video</button>
        </div>

        <div id="fase-trampa">
            <p class="mensaje-trampa">Pensaste que estaba tan facil amor?</p>
            <p style="color: #aaa; margin-bottom: 20px; font-size: 14px;">Ingresa el código secreto</p>
            
            <div class="pin-container" id="caja-pines">
                <input type="password" maxlength="1" class="pin-box" autofocus>
                <input type="password" maxlength="1" class="pin-box">
                <input type="password" maxlength="1" class="pin-box">
                <input type="password" maxlength="1" class="pin-box">
            </div>
            
            <p class="mensaje-error" id="mensaje-error">Contraseña incorrecta. Intenta de nuevo.</p>
        </div>

        <div id="fase-video">
            <h2 style="color: #FF0000;">¡Lo lograste! ❤️</h2>
            <p>Aquí irá incrustado tu video principal.</p>
            </div>

        <div id="fase-troll">
            <img src="troll.jpeg" alt="Troll" class="imagen-troll">
            <h2 style="color: #ffcc00; margin-top: 15px;">Como va a ser tan facil ps amor eres chiste 😂</h2>
            <button class="btn-accion" id="btn-volver-troll">Volver a intentar</button>
        </div>

        <div id="fase-preview-mensaje">
            <h2 style="font-size: 32px; color: #00ffcc; margin-bottom: 40px;">Felicidades, desbloqueaste un preview 🥳</h2>
            <button class="btn-accion btn-gigante" id="btn-ver-preview">VER EL PREVIEW</button>
        </div>

       <div id="fase-preview-video">
            <iframe class="reproductor" style="aspect-ratio: 16/9; height: auto;" width="560" height="315" src="https://www.youtube.com/embed/LV3vuipCWWQ?si=-GWRX_Tg8-Mc2Zvt" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            <br>
            <button class="btn-accion" id="btn-volver-preview" style="background-color: #333; margin-top: 30px; font-size: 16px; padding: 10px 20px;">Seguir intentando códigos</button>
        </div>

    </div>

    <script>
        // --- DICCIONARIO DE CONTRASEÑAS ---
        const CODIGOS = {
            "9657": "video_principal", 
            "0803": "troll",
            "1709": "preview" // Nuevo código agregado
        };

        // Captura de elementos
        const btnYoutube = document.getElementById('btn-youtube');
        const btnVolverTroll = document.getElementById('btn-volver-troll');
        const btnVerPreview = document.getElementById('btn-ver-preview');
        const btnVolverPreview = document.getElementById('btn-volver-preview');
        
        const faseBoton = document.getElementById('fase-boton');
        const faseTrampa = document.getElementById('fase-trampa');
        const faseVideo = document.getElementById('fase-video');
        const faseTroll = document.getElementById('fase-troll');
        const fasePreviewMensaje = document.getElementById('fase-preview-mensaje');
        const fasePreviewVideo = document.getElementById('fase-preview-video');
        
        const inputs = document.querySelectorAll('.pin-box');
        const contenedorPines = document.getElementById('caja-pines');
        const mensajeError = document.getElementById('mensaje-error');

        // Navegación Inicial
        btnYoutube.addEventListener('click', () => {
            faseBoton.style.display = 'none';
            faseTrampa.style.display = 'block';
            inputs[0].focus();
        });

        // Volver al panel de contraseñas desde otras pantallas
        function volverAlPanel() {
            faseTroll.style.display = 'none';
            fasePreviewVideo.style.display = 'none';
            faseTrampa.style.display = 'block';
            resetearInputs();
        }

        btnVolverTroll.addEventListener('click', volverAlPanel);
        btnVolverPreview.addEventListener('click', volverAlPanel);

        // Pasar del mensaje de preview al video
        btnVerPreview.addEventListener('click', () => {
            fasePreviewMensaje.style.display = 'none';
            fasePreviewVideo.style.display = 'block';
        });

        // Lógica de Inputs
        inputs.forEach((input, index) => {
            input.addEventListener('keyup', (e) => {
                if (e.key >= 0 && e.key <= 9) {
                    inputs[index].value = e.key;
                    mensajeError.style.opacity = '0';
                    
                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    } else {
                        verificarPassword();
                    }
                } 
                else if (e.key === 'Backspace') {
                    inputs[index].value = '';
                    if (index > 0) {
                        inputs[index - 1].focus();
                    }
                }
            });

            input.addEventListener('input', function() {
                this.value = this.value.replace(/[^0-9]/g, '');
            });
        });

        function resetearInputs() {
            inputs.forEach(input => input.value = '');
            inputs[0].focus();
        }

        // Lógica de Validación Dinámica
        function verificarPassword() {
            let passwordIngresada = '';
            inputs.forEach(input => passwordIngresada += input.value);

            const accion = CODIGOS[passwordIngresada];

            if (accion === "video_principal") {
                faseTrampa.style.display = 'none';
                faseVideo.style.display = 'block';
            } else if (accion === "troll") {
                faseTrampa.style.display = 'none';
                faseTroll.style.display = 'block';
            } else if (accion === "preview") {
                faseTrampa.style.display = 'none';
                fasePreviewMensaje.style.display = 'block'; // Muestra el mensaje con el botón gigante primero
            } else {
                // Código incorrecto
                mensajeError.style.opacity = '1';
                contenedorPines.classList.add('vibrar');
                
                setTimeout(() => {
                    contenedorPines.classList.remove('vibrar');
                    resetearInputs();
                }, 400);
            }
        }
    </script>

</body>
</html>
